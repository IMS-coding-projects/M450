name: Build & Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Set up application.properties for testing
      run: |
        mkdir -p ./OrariAperti/backend/src/test/resources
        cat > ./OrariAperti/backend/src/test/resources/application.properties <<'EOF'
        # Test Configuration

        ## General
        spring.application.name=${SPRING_APPLICATION_NAME:OrariAperti}

        ## Database
        spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
        spring.datasource.driverClassName=org.h2.Driver
        spring.datasource.username=sa
        spring.datasource.password=
        spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
        spring.jpa.hibernate.ddl-auto=create-drop
        spring.sql.init.mode=never

        # CORS and Redirect Configuration
        frontend.url=${FRONTEND_URL:http://localhost:3000}
        EOF

    - name: Test with Maven
      run: mvn test
      working-directory: ./OrariAperti/backend

    - name: Build with Maven
      run: mvn -DskipTests package
      working-directory: ./OrariAperti/backend